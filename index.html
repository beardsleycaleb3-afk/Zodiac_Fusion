<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zodiac_Fusion</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* CSS: Hardware Layer & Mobile Optimization */
    html, body { 
      width: 100%; height: 100%; margin: 0; padding: 0; 
      background: #050510; overflow: hidden; touch-action: none; 
      user-select: none; -webkit-user-select: none;
    }
    #gameWrapper {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      background: linear-gradient(135deg, #1a0528 0%, #050510 100%);
    }
    /* The Monitor */
    .monitor {
      flex: 1; position: relative; background: #000;
      border: 4px solid #2c3e50; margin: 10px; border-radius: 4px;
      overflow: hidden;
    }
    #gameCanvas { width: 100%; height: 100%; image-rendering: pixelated; }

    /* Control Area (180px) */
    .controls { height: 180px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
    
    /* D-Pad */
    .dpad { position: relative; width: 120px; height: 120px; }
    .d-btn { position: absolute; background: #34495e; border: 2px solid #2c3e50; }
    .up { width: 40px; height: 45px; top: 0; left: 40px; }
    .down { width: 40px; height: 45px; bottom: 0; left: 40px; }
    .left { width: 45px; height: 40px; top: 40px; left: 0; }
    .right { width: 45px; height: 40px; top: 40px; right: 0; }

    /* A/B Buttons: 55px size, 30px gap */
    .ab-btns { display: flex; flex-direction: column; gap: 30px; }
    .btn { 
      width: 55px; height: 55px; border-radius: 50%; color: white; 
      font-weight: bold; border: 3px solid rgba(0,0,0,0.2);
      display: flex; align-items: center; justify-content: center;
    }
    .a-btn { background: #f1c40f; color: #333; }
    .b-btn { background: #e74c3c; }
  </style>
</head>
<body>
  <div id="gameWrapper">
    <div class="monitor">
      <canvas id="gameCanvas"></canvas>
    </div>
    <div class="controls">
      <div class="dpad">
        <div class="d-btn up" id="upBtn"></div>
        <div class="d-btn down" id="downBtn"></div>
        <div class="d-btn left" id="leftBtn"></div>
        <div class="d-btn right" id="rightBtn"></div>
      </div>
      <div class="ab-btns">
        <div class="btn b-btn" id="bBtn">B</div>
        <div class="btn a-btn" id="aBtn">A</div>
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
