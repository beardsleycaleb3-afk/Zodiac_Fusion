<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
body { 
  margin:0; 
  overflow:hidden; 
  background:#0abbbb;
  height:100dvh; 
  font-family:system-ui,sans-serif;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
  text-align:center;
}

#canvasCtn { position:fixed; inset:0; z-index:-1; }

/* Console container - 10px inset - Neon Dark Purple Theme */
.console-border {
  position:fixed;
  inset:1px;
  border:1px solid #9b59b6;
  border-radius:1px 1px 1px 1px;
  pointer-events:none;
  background:linear-gradient(135deg, #1a0528 0%, #00ff00 100%);
  box-shadow:0 0 40px rgba(155,89,182,0.6), inset 0 0 30px rgba(0,0,0,0.8);
  display:flex;
  flex-direction:column;
}

/* Monitor - game display area */
.monitor {
  margin: 20px;
  margin-bottom: 100px;
  background: #fff;
  border: 2px solid #4a235a;
  border-radius: 0px 0px 0px 0px;
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  font-family: 'Courier New', monospace;
  color: #333;
  box-shadow: inset 0 0 15px rgba(0,0,0,0.4);
  overflow: hidden;
  position: relative;
}

/* Game canvas within monitor */
#gameCanvas {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  background: #2a2a2a;
}

/* Message box for dialogues and battles */
#messageBox {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  background: #1a1a3e;
  border: 2px solid #6c3483;
  display: none;
  flex-direction: column;
  padding: 8px;
  box-sizing: border-box;
  z-index: 5;
}

#messageText {
  flex: 1;
  color: #fff;
  font-size: 14px;
  line-height: 1.4;
  overflow-y: auto;
  margin-bottom: 8px;
}

#choiceContainer {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.choiceBtn {
  background: #4a235a;
  color: #fff;
  border: 1px solid #9b59b6;
  padding: 4px 8px;
  cursor: pointer;
  font-size: 12px;
  font-family: 'Courier New', monospace;
}

.choiceBtn:hover, .choiceBtn.selected {
  background: #9b59b6;
}

/* Start/Select Strip */
.menu-strip {
  position: absolute;
  top: 0px;
  width: 100%;
  height: -10px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 180px;
  z-index: 10;
  pointer-events: none;
